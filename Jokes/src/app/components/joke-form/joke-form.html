<h1 class="fw-normal mb-3">New joke</h1>
<hr class="mb-3">

<div class="mb-3">
  <input
    type="text"
    class="form-control"
    placeholder="Username"
    [(ngModel)]="username"
  >
</div>

<div class="mb-3">
  <textarea
    class="form-control"
    rows="5"
    placeholder="Joke"
    [(ngModel)]="text"
  ></textarea>
</div>

<div class="d-flex justify-content-end mb-5">
  <button type="button" class="btn btn-outline-primary" (click)="submitJoke()">
    Submit
  </button>
</div>
