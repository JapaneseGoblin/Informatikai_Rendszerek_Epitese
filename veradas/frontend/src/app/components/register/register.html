<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white rounded-lg shadow p-8 w-full max-w-md">
    <div class="flex items-center gap-3 mb-6">
      <h1 class="text-2xl font-bold text-red-700">Regisztráció</h1>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email cím</label>
        <input [(ngModel)]="email" type="email" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Jelszó</label>
        <input [(ngModel)]="password" type="password" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Jelszó újra</label>
        <input [(ngModel)]="passwordAgain" type="password" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500" />
      </div>
      <div *ngIf="error" class="text-red-600 text-sm">{{ error }}</div>
      <div *ngIf="success" class="text-green-600 text-sm">{{ success }}</div>
      <button (click)="submit()" class="w-full bg-red-700 text-white px-4 py-2 rounded hover:bg-red-800">Regisztráció</button>
      <p class="text-center text-sm text-gray-500">Már van fiókod? <a routerLink="/login" class="text-red-700 hover:underline">Bejelentkezés</a></p>
    </div>
  </div>
</div>
