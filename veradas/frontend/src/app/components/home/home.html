<div class="max-w-5xl mx-auto py-12 px-4">
  <div class="flex items-center gap-3 mb-8">
    <h1 class="text-3xl font-bold text-red-700">Dr. Drakula</h1>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <div class="bg-red-700 text-white px-4 py-3">
        <h2 class="text-lg font-semibold">Ranglista</h2>
      </div>
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
          <tr>
            <th class="px-4 py-3 text-left">Helyezés</th>
            <th class="px-4 py-3 text-left">Név</th>
            <th class="px-4 py-3 text-left">Véradások</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          <tr *ngFor="let entry of leaderboard; let i = index" [class]="i === 0 ? 'bg-yellow-50' : i === 1 ? 'bg-gray-50' : i === 2 ? 'bg-orange-50' : ''">
            <td class="px-4 py-3 font-bold">
              <span *ngIf="i === 0" class="text-yellow-500">1.</span>
              <span *ngIf="i === 1" class="text-gray-400">2.</span>
              <span *ngIf="i === 2" class="text-orange-400">3.</span>
              <span *ngIf="i > 2">{{ i + 1 }}.</span>
            </td>
            <td class="px-4 py-3 font-medium">{{ entry.name }}</td>
            <td class="px-4 py-3">{{ entry.count }}</td>
          </tr>
          <tr *ngIf="leaderboard.length === 0">
            <td colspan="3" class="px-4 py-6 text-center text-gray-400">Nincs adat</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
      <div class="bg-red-700 text-white px-4 py-3">
        <h2 class="text-lg font-semibold">Aktív helyszínek</h2>
      </div>
      <ul class="divide-y divide-gray-200">
        <li *ngFor="let loc of locations" class="px-4 py-3">
          <p class="font-medium text-gray-800">{{ loc.name }}</p>
          <p class="text-sm text-gray-500">{{ loc.address }}</p>
        </li>
        <li *ngIf="locations.length === 0" class="px-4 py-6 text-center text-gray-400">
          Jelenleg nincs aktív helyszín
        </li>
      </ul>
    </div>
  </div>
</div>
