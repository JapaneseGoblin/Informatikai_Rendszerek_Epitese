<div class="max-w-4xl mx-auto py-12 px-4">
  <h1 class="text-2xl font-bold text-red-700 mb-6">Helyszínek</h1>

  <div *ngIf="authService.isLoggedIn()" class="bg-white rounded-lg shadow p-6 mb-6">
    <h2 class="text-xl font-semibold text-gray-700 mb-4">Új helyszín</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Intézmény neve</label>
        <input [(ngModel)]="name" type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Cím</label>
        <input [(ngModel)]="address" type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-500" />
      </div>
    </div>
    <div *ngIf="error" class="mt-3 text-red-600 text-sm">{{ error }}</div>
    <div *ngIf="success" class="mt-3 text-green-600 text-sm">{{ success }}</div>
    <button (click)="submit()" class="mt-4 bg-red-700 text-white px-4 py-2 rounded hover:bg-red-800">Mentés</button>
  </div>

  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-red-700 text-white uppercase text-xs">
        <tr>
          <th class="px-4 py-3 text-left">Intézmény neve</th>
          <th class="px-4 py-3 text-left">Cím</th>
          <th class="px-4 py-3 text-left">Állapot</th>
          <th *ngIf="authService.isLoggedIn()" class="px-4 py-3 text-left">Műveletek</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        <tr *ngFor="let loc of locations">
          <td class="px-4 py-3">{{ loc.name }}</td>
          <td class="px-4 py-3">{{ loc.address }}</td>
          <td class="px-4 py-3">
            <span [class]="loc.is_active ? 'bg-green-100 text-green-700 px-2 py-1 rounded text-xs' : 'bg-red-100 text-red-700 px-2 py-1 rounded text-xs'">
              {{ loc.is_active ? 'Aktív' : 'Inaktív' }}
            </span>
          </td>
          <td *ngIf="authService.isLoggedIn()" class="px-4 py-3 flex gap-3">
            <button (click)="toggle(loc)" class="text-red-700 hover:underline text-sm">
              {{ loc.is_active ? 'Inaktiválás' : 'Aktiválás' }}
            </button>
            <button (click)="confirmDelete(loc)" class="text-gray-400 hover:text-red-700 text-sm">Törlés</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="deleteTarget" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg p-6 max-w-sm w-full mx-4">
    <h2 class="text-lg font-semibold text-gray-800 mb-2">Törlés megerősítése</h2>
    <p class="text-gray-600 mb-6">Biztosan törlöd a <span class="font-semibold">{{ deleteTarget.name }}</span> helyszínt?</p>
    <div class="flex gap-3 justify-end">
      <button (click)="cancelDelete()" class="px-4 py-2 rounded bg-gray-200 text-gray-700 hover:bg-gray-300">Nem</button>
      <button (click)="doDelete()" class="px-4 py-2 rounded bg-red-700 text-white hover:bg-red-800">Igen</button>
    </div>
  </div>
</div>
